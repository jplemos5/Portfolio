<section id="about" class="section" style="height: 100vh; margin-bottom: 50px;">
    <mat-card style="width: 77.5vw; margin: auto; margin-top: 20px; background-color: transparent; box-shadow: none;">
        <div style="display: flex; align-items: center; width: 100%;">
            <div style="width: 50%; max-width: 600px; display: flex; flex-direction: column;">

                <h1 style="font-size: 90px; color:#F5F5F5; margin-bottom: 45px;">About Me</h1>

                <h2 style="color:#F5F5F5; font-weight: 400; line-height: 1.6;">
                I’m an IT professional with a Master’s in Computer Science, passionate about building solutions and learning new technologies.
                </h2>
                <h2 style="color:#F5F5F5; font-weight: 400; line-height: 1.6; margin-top: 15px;">
                I enjoy solving problems, working in teams, and turning ideas into real-world projects.
                </h2>

                <div class="action-buttons" style="margin-top: 25px; display: flex; gap: 15px;">
                    <a class="action-button" href="João Lemos CV.pdf" target="_blank" rel="noopener noreferrer">
                        <mat-icon>description</mat-icon> Curriculum Vitae
                    </a>
                    <button class="action-button" (click)="scrollToContacts()">
                        <mat-icon>contacts</mat-icon> Contacts
                    </button>
                </div>
            </div>

            <div style="width:50%; margin-left:auto; display:flex; flex-direction:column; align-items:center;">

                <div class="image-swap-container"
                    (mouseenter)="onMouseEnter()"
                    (mouseleave)="onMouseLeave()"
                    (click)="togglePage()"
                    style="margin-bottom:10px; cursor:pointer;">

                    <img [src]="mainImage" alt="Current Image" class="main-image">

                    <img *ngIf="!hoverService.hoverDisabled && hovering"
                        [src]="hoverImage"
                        alt="Hover Image"
                        class="hover-image">
                </div>

                <div style="display:flex; justify-content:center; gap:10px;">
                    <mat-button-toggle-group
                        [(ngModel)]="selectedMode"
                        class="mode-toggle"
                        exclusive
                        aria-label="Mode selection"
                        (change)="onModeChange($event.value)">
                        <mat-button-toggle value="professional">
                            <mat-icon>work</mat-icon> Professional
                        </mat-button-toggle>
                        <mat-button-toggle value="personal">
                            <mat-icon>person</mat-icon> Personal
                        </mat-button-toggle>
                    </mat-button-toggle-group>
                </div>
            </div>
        </div>
    </mat-card>
</section>
