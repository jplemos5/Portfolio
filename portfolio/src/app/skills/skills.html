<section id="skills" class="section skills-section">
  <h1 class="skills-title">Skills</h1>
  <h5 class="skills-subtitle"> The tools, tech, and skills I use to bring ideas to life! </h5>
  <mat-card class="skills-container">
    <mat-tab-group mat-stretch-tabs="false" mat-align-tabs="center" animationDuration="0ms">
      <mat-tab *ngFor="let category of themes[0] | keyvalue" [label]="category.key">
        <div class="skills-grid">
          <app-progress
            *ngFor="let prog of category.value"
            [skill]="prog.skill"
            [percentage]="prog.percentage"
            [imageUrl]="prog.imageUrl">
          </app-progress>
        </div>
      </mat-tab>
    </mat-tab-group>
  </mat-card>
</section>
