<section id="projects" class="section projects-section">
    <h1 class="projects-title">Projects</h1>
    <div class="projects-grid" style="width: 92%; margin: auto;">
        <div *ngFor="let project of projects"
            class="container">
            <app-project-card
                [title]="project.title"
                [image]="project.image"
                [text]="project.text"
                [skillsUsed]="project.skillsUsed"
                [links]="project.links">
            </app-project-card>
        </div>
    </div>
</section>
