<section id="projects" class="section projects-section">
    <h1 class="projects-title">Projects</h1>
    <h5 class="contacts-subtitle"> Here are the main and biggest projects I’ve worked on. </h5>
    <div class="projects-grid">
        <div *ngFor="let project of projects"
            class="container">
            <app-project-card
                [title]="project.title"
                [image]="project.image"
                [text]="project.text"
                [skillsUsed]="project.skillsUsed"
                [links]="project.links">
            </app-project-card>
        </div>
    </div>
</section>
