<section id="experience" class="section" style="width: 77.5vw; margin: auto;">
    <h1 style="font-size: 90px; color:#F5F5F5; margin-bottom: 65px;">Experiences</h1>
    <div class="timeline">
        <div *ngFor="let exp of experiences; let i = index"
            class="container"
            [ngClass]="exp.side">
        <app-experience-card
            [title]="exp.title"
            [subtitle]="exp.subtitle"
            [image]="exp.image"
            [logo]="exp.logo"
            [text]="exp.text"
            [fulltext]="exp.fulltext"
            [experiences]="experiences"
            [index]="i">
        </app-experience-card>
        </div>
    </div>
</section>
