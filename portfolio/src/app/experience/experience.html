<section id="experience" class="section experience-section">
    <h1 class="experience-title">Experiences</h1>
    <h5 class="experience-subtitle"> This is my journey so far the places I’ve been, what I’ve learned, and what I’ve worked on. Feel free to explore each entry for more details! </h5>
    <div class="timeline">
        <div *ngFor="let exp of experiences; let i = index"
            class="container"
            [ngClass]="exp.side">
            <app-experience-card
                [title]="exp.title"
                [subtitle]="exp.subtitle"
                [image]="exp.image"
                [logo]="exp.logo"
                [text]="exp.text"
                [fulltext]="exp.fulltext"
                [experiences]="experiences"
                [index]="i">
            </app-experience-card>
        </div>
    </div>
</section>
